version: '3.8'

# Sobe um PostgreSQL local para desenvolvimento — não precisa instalar
# nada na máquina além do Docker. Rode com: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-api-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
